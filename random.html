<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ランダム学習 | English Notebook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- JS -->
  <script src="words.js" defer></script>
  <script src="app.js" defer></script>
  <script src="random.js" defer></script>
</head>

<body>
  <a href="index.html" class="home-logo">Aonull_</a>
  <div class="app-shell">

    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">ランダム学習</h1>
        <p class="app-subtitle">全単語・Unit指定・苦手単語からランダムに学習できます。</p>
      </div>
    </header>

    <!-- メイン -->
    <main class="app-main">

      <!-- 設定カード -->
      <section class="card">
        <h2 class="card-title">ランダム設定</h2>

        <!-- 出題範囲 -->
        <div style="margin-top:16px;">
          <h3>出題範囲</h3>
          <label><input type="radio" name="range" value="all" checked> 全単語（102語）</label><br>
          <label><input type="radio" name="range" value="unit"> Unit指定</label><br>
          <label><input type="radio" name="range" value="favorites"> 苦手単語のみ</label>
        </div>

        <!-- Unit選択 -->
        <div id="randomUnitSelect" style="margin-top:16px; display:none;">
          <h3>Unit選択</h3>
          <select id="unitSelect" style="padding:10px; border-radius:var(--radius); border:1px solid var(--border);">
            <option value="1">Unit 1</option>
            <option value="2">Unit 2</option>
            <option value="3">Unit 3</option>
            <option value="4">Unit 4</option>
            <option value="5">Unit 5</option>
            <option value="6">Unit 6</option>
            <option value="7">Unit 7</option>
            <option value="8">Unit 8</option>
            <option value="9">Unit 9</option>
          </select>
        </div>

        <!-- スタート -->
        <div style="margin-top:24px;">
          <button id="startRandomBtn" class="primary-button" style="width:100%;">
            ランダム学習を開始
          </button>
        </div>
      </section>

      <!-- 単語カード -->
      <section class="card" id="randomCard" style="margin-top:20px; display:none;">
        <h2 class="card-title" id="randomNumber">No.1</h2>

        <p id="randomEnglish" style="font-size:24px; margin-top:10px;">nation</p>

        <button id="showMeaningBtn" class="primary-button" style="margin-top:10px;">
          意味を表示
        </button>

        <p id="randomJapanese" style="display:none; margin-top:10px; font-size:18px;">
          国家
        </p>

        <button id="pronounceBtn" class="secondary-button" style="margin-top:10px;">
          発音する
        </button>

        <button id="nextRandomBtn" class="primary-button" style="margin-top:20px; width:100%;">
          次の単語へ
        </button>
      </section>

    </main>

    <!-- フッター -->
    <footer class="app-footer">
      <p class="footer-text">
        English Notebook &copy; <span id="footerYear"></span>
      </p>
    </footer>

  </div>

  <!-- キーボードヒント -->
  <div class="keyboard-hint">
    Enter / Space で意味表示、→ で次の単語へ
  </div>

</body>
</html>

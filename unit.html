<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Unit | English Notebook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- JS -->
  <script src="words.js" defer></script>
  <script src="app.js" defer></script>
  <script src="unit.js" defer></script>
</head>

<body data-theme="light">
  <a href="index.html" class="home-logo">Aonull_</a>
  <div class="app-shell">

    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">Unit学習</h1>
        <p class="app-subtitle">英単語を順番に学習できます。</p>
      </div>
      <div class="header-right">
        <button id="themeToggle" class="icon-button" aria-label="テーマ切り替え">
          <span class="icon-moon"></span>
        </button>
      </div>
    </header>

    <!-- メイン -->
    <main class="app-main">

      <section class="swipe-container">
        <div id="card" class="swipe-card">
          <div class="card-front">
            <h2 id="wordEnglish">nation</h2>
            <p id="wordNumber">No.1</p>
          </div>

          <div class="card-back" id="wordJapanese">
            国家
          </div>
        </div>

        <div class="swipe-buttons">
          <button id="showMeaningBtn" class="primary-button">意味を見る</button>
          <button id="pronounceBtn" class="secondary-button">発音</button>
          <button id="favoriteBtn" class="secondary-button">苦手に追加</button>
        </div>
      </section>

    </main>

    <!-- フッター -->
    <footer class="app-footer">
      <p class="footer-text">
        English Notebook &copy; <span id="footerYear"></span>
      </p>
    </footer>

  </div>

  <!-- キーボードヒント -->
  <div class="keyboard-hint">
    ← → で単語移動、Enter / Space でボタン操作
  </div>

</body>
</html>
